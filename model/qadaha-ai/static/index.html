<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qadaha AI Assessment</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>Qadaha <span>AI</span></h1>
            <p>التقييم الذكي للقدرة المالية والمخاطر</p>
        </header>

        <main class="glass-panel">
            <form id="assessment-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="avg_monthly_income_6m">متوسط الدخل الشهري (6 أشهر)</label>
                        <input type="number" id="avg_monthly_income_6m" value="12000" required>
                    </div>
                    <div class="input-group">
                        <label for="income_volatility_score">درجة تذبذب الدخل (0-100)</label>
                        <input type="number" id="income_volatility_score" value="15" required>
                    </div>
                    <div class="input-group">
                        <label for="avg_monthly_expenses">متوسط المصروفات الشهرية</label>
                        <input type="number" id="avg_monthly_expenses" value="7000" required>
                    </div>
                    <div class="input-group">
                        <label for="monthly_obligations">الالتزامات الشهرية</label>
                        <input type="number" id="monthly_obligations" value="2500" required>
                    </div>
                    <div class="input-group">
                        <label for="ending_balance_avg">متوسط الرصيد الختامي</label>
                        <input type="number" id="ending_balance_avg" value="9000" required>
                    </div>
                    <div class="input-group">
                        <label for="cashflow_stability_score">درجة استقرار التدفق النقدي</label>
                        <input type="number" id="cashflow_stability_score" value="90" required>
                    </div>
                    <div class="input-group">
                        <label for="proposed_installment_amount">مبلغ القسط المقترح</label>
                        <input type="number" id="proposed_installment_amount" value="1000" required>
                    </div>
                    <div class="input-group">
                        <label for="obligation_to_income_ratio">نسبة الالتزامات إلى الدخل (0-1)</label>
                        <input type="number" step="0.01" id="obligation_to_income_ratio" value="0.21" required>
                    </div>
                    <div class="input-group">
                        <label for="avg_monthly_surplus">متوسط الفائض الشهري</label>
                        <input type="number" id="avg_monthly_surplus" value="3500" required>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn" id="submit-btn">
                    <span>تحليل البيانات</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>
        </main>

        <section id="results" class="results-section hidden">
            <h2 class="section-title">تقرير Qadaha AI</h2>
            
            <div class="cards-grid">
                <div class="result-card glass-panel score-card">
                    <h3>Qadaha Score</h3>
                    <div class="score-circle">
                        <svg viewBox="0 0 36 36" class="circular-chart">
                            <path class="circle-bg"
                                d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831"
                            />
                            <path class="circle" id="score-circle-path"
                                stroke-dasharray="0, 100"
                                d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831"
                            />
                            <text x="18" y="20.35" class="percentage" id="score-text">0</text>
                        </svg>
                    </div>
                </div>

                <div class="result-card glass-panel status-card">
                    <h3>الحالة</h3>
                    <p id="status-text" class="status-badge">جاري التحليل...</p>
                    <p class="confidence">نسبة الثقة: <span id="confidence-text">--%</span></p>
                </div>

                <div class="result-card glass-panel risk-card">
                    <h3>مستوى المخاطرة</h3>
                    <p id="risk-text">--</p>
                </div>
            </div>

            <div class="details-grid">
                <div class="details-card glass-panel">
                    <h3>💡 التوصيات الذكية</h3>
                    <ul id="recommendations-list" class="styled-list"></ul>
                </div>
                
                <div class="details-card glass-panel">
                    <h3>📋 الأسباب المؤثرة</h3>
                    <ul id="reasons-list" class="styled-list"></ul>
                </div>

                <div class="details-card glass-panel full-width">
                    <h3>🤖 تفسير الذكاء الاصطناعي (أهم العوامل)</h3>
                    <div id="ai-explanation" class="factors-list"></div>
                </div>
            </div>
        </section>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
